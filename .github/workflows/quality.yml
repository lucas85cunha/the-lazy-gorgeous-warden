name: 🎩 Warden Quality & Security

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔍 Lint with Ruff (Style & Quality)
        run: ruff check .

      - name: 🛡️ Security Scan with Bandit (DevSecOps)
        run: bandit -r . -v
