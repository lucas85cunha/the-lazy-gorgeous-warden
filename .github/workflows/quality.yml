name: 🎩 Warden Quality & Security

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Força o uso do Node 24 para evitar warnings de 2026
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4 # Verifique se há v5+ disponível

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔍 Lint with Ruff
        run: ruff check . --output-format github

      - name: 🛡️ Security Scan with Bandit
        run: bandit -r . -f txt # Formato simples para log
